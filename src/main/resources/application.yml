      host: localhost
      port: 6379
      ssl:
        enabled: false
  kafka:
    bootstrap-servers: localhost:9092
#    mongodb:
#      uri: mongodb://root:root@localhost:27017/Chat-service?auth=admin

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        jdbc:
          batch_size: 50
          batch_versioned_data: true
        order_updates: true
        order_inserts: true
    show-sql: true
  liquibase:
    change-log: classpath:db.changelog/db.changelog-master.xml
    enabled: true
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB


